name: "Daily Energy Storage Market Scanner"

on:
  schedule:
    # 每天 UTC 8:00 执行 (北京时间 16:00)
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "强制运行扫描 (忽略缓存)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

env:
  BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
  SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
  NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        run: |
          git clone --depth 1 --branch "${GITHUB_REF_NAME:-main}" "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up Python
        run: python3 --version

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Run market scanner
        run: python3 scripts/market_scanner.py
        continue-on-error: true

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date -u +%Y-%m-%d)
          REPORT="reports/market-report-${DATE}.md"
          if [ -f "$REPORT" ]; then
            git add reports/
            git diff --cached --quiet || {
              git commit -m "📊 市场扫描日报: ${DATE}"
              git push
            }
          else
            echo "No report generated – skipping commit"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Market scan encountered issues. Check logs for details."
